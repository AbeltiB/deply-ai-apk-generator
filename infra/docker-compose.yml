name: aiapk

services:
  # -------------------------
  # Application Services
  # -------------------------
  api:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: aiapk-api
    env_file:
      - .env
      - ../ai-service/.env
    ports:
      - "${API_PORT}:8000"
    restart: on-failure
    networks:
      - aiapk-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  aiapk-network:
    driver: bridge